services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: false
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/licenses
      KC_DB_USERNAME: app
      KC_DB_PASSWORD: secret
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: licenses
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  license-service:
    build: ./license-service
    environment:
      DB_URL: postgres://app:secret@postgres:5432/licenses
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/license-demo/protocol/openid-connect/certs
    ports:
      - "9000:9000"
    depends_on:
      - postgres
      - keycloak

  admin-ui:
    build: ./admin-ui
    volumes:
      - ./static:/app/static
      - ./templates:/app/shared
    environment:
      LICENSE_SERVICE_URL: http://license-service:9000
      OIDC_CLIENT_ID: admin-ui
      OIDC_CLIENT_SECRET: ${ADMIN_UI_CLIENT_SECRET}
      OIDC_SERVER: http://keycloak:8080/realms/license-demo
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
    ports:
      - "5001:5001"

  frontend:
    build: ./frontend
    volumes:
      - ./static:/app/static
      - ./templates:/app/shared
    environment:
      LICENSE_SERVICE_URL: http://license-service:9000
      OIDC_CLIENT_ID: frontend
      OIDC_CLIENT_SECRET: ${FRONTEND_CLIENT_SECRET}
      OIDC_SERVER: http://keycloak:8080/realms/license-demo
    ports:
       - "5010:5000"